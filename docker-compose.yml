services:
  api:
    build:
      context: .
      target: dev
    container_name: service-provider-api
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Override DB_HOST for the docker network — Postgres lives at the
      # service name `postgres`, not on localhost.
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      # Mount source for hot reload via nodemon
      - .:/app
      # Anonymous volume preserves the container's node_modules so it
      # is not overwritten by a (possibly missing or wrong-arch) host one
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    container_name: service-provider-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-service_provider_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-service_provider_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
